name: Daily News Sentiment Pipeline (Airflow-Hybrid)

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  run_and_push:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      DB_HOST: ${{ secrets.AIVEN_HOST }}
      DB_PORT: ${{ secrets.AIVEN_PORT }}
      DB_USER: ${{ secrets.AIVEN_USER }}
      DB_PASSWORD: ${{ secrets.AIVEN_PASSWORD }}
      DB_DATABASE: ${{ secrets.AIVEN_DATABASE }}
      HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libmysqlclient-dev
        pip install -r Requirements.txt
        python -m spacy download en_core_web_sm

    - name: Execute Full Pipeline (7-Step Airflow-Compatible)
      run: python run_full_pipeline.py

    - name: Copy dashboard JSON to frontend
      run: |
        mkdir -p frontend/public/data
        cp -f Data_Output/dashboard_data.json frontend/public/data/dashboard_data.json || true

    - name: Commit and push results
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Daily Run: Pipeline with RoBERTa sentiment, DuckDB warehouse, dbt models"

        files: |
          raw_csv_daily/*.csv
          cleaned_csv_daily/*.csv
          Data_Output/Matplotlib_Charts/*.png
          Data_Output/dashboard_data.json
          Data_Output/warehouse.duckdb
          Data_Output/quality_reports/*.json
          frontend/public/data/dashboard_data.json